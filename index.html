<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Clement : Le Jukebox Humain</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #181818;
            --text-main: #FFFFFF;
            --text-sub: #B3B3B3;
            --spotify-green: #1DB954;
        }

        body { 
            font-family: 'Circular', Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
            color: var(--text-main); 
            padding: 40px; 
            margin: 0; 
            height: 100vh;
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .container { 
            max-width: 500px; 
            margin: auto; 
            background-color: rgba(24, 24, 24, 0); 
            border: 1px solid rgba(255, 255, 255, 0.308);
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 { color: var(--text-main); font-size: 1.5em; margin-bottom: 20px; }

        .stats { 
            background: #282828; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0; 
            color: var(--text-sub); 
            font-size: 0.9em;
        }

        button { 
            background-color: var(--spotify-green); 
            color: black; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1em; 
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover { 
            background-color: #1ed760; 
            transform: scale(1.05); 
        }

        #affichage { 
            margin-top: 40px; 
            min-height: 100px; 
        }

        #affichage strong { 
            display: block; 
            font-size: 1.6em; 
            color: var(--text-main); 
        }

        #affichage em { 
            font-style: normal; 
            color: var(--text-sub); 
            font-size: 1.2em; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>La playlist (Random) de Clément</h1>
        
        <div class="stats">
            <strong>Playlist :</strong>
            <p id="compteur">Titres restants : 29 / 29</p>
        </div>

        <button onclick="generer()">Chanson suivante</button>
        <div id="affichage"></div>
    </div>

            { titre: "Champs-Élysées", artiste: "SCH", img : "https://i.ibb.co/Lz972Y7N/1200x680.jpg" },

            { titre: "J'ai laissé", artiste: "Christophe Maé", img : "https://i.ibb.co/spBxPvm5/Christophe-Mae-Cest-drole-la-vie-Fabien-Vieilletoile.png"},
            { titre: "Zombie", artiste: "Gims", img : "https://i.ibb.co/Qj32XxPm/gims.webp" },
            { titre: "Sur ma route", artiste: "Black M", img : "https://i.ibb.co/LdzC03RN/black-m-ip-4.jpg" },

            { titre: "Démon de minuit", artiste: "Images" , img : "https://i.ibb.co/Zzj0DRh2/maxresdefault.jpg"},
            { titre: "Je suis pas un héros", artiste: "Daniel Balavoine", img : "https://i.ibb.co/spw8JgyM/1444x920-chanteur-daniel-balavoine-1984.webp" },

            { titre: "Don't stop the party", artiste: "Black Eyed Peas", img : "https://i.ibb.co/rRz0n3Hc/Les-Black-Eyed-Peas-en-concert-au-VIP-Room-Paris-3-cropped.jpg" },

            { titre: "Suavemente", artiste: "Soolking", img: "https://i.ibb.co/60f92BY9/medias-2023-09-t7lbqtkjloj-zejzrxdux3a8favq9ylfpym-9njt02s-65168f20365b2.webp" },
            { titre: "Crazy", artiste: "Gnarls Barkley", img : "https://i.ibb.co/jvf9mmXL/Gnarls-Barkley.jpg" },

            { titre: "Blanka", artiste: "PNL", img : "https://i.ibb.co/N6rFyRcQ/2048.webp" },
            { titre: "J'comprends pas", artiste: "PNL", img : "https://i.ibb.co/N6rFyRcQ/2048.webp" },
            { titre: "Balader", artiste: "Sexion d'Assaut", img : "https://i.ibb.co/wZ4hw6Zn/sexion.jpg" },
            { titre: "Wake Me Up", artiste: "Avicii", img : "https://i.ibb.co/MDMmPKpw/avatars-000330767037-lhcj27-t500x500.jpg" }
        ];

        let fileAttente = [];

        function melanger(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function generer() {
            if (fileAttente.length === 0) {
                fileAttente = melanger([...baseRepertoire]);
            }

            const item = fileAttente.pop();
            document.getElementById('affichage').innerHTML = `<strong>${item.titre}</strong><br><em>${item.artiste}</em>`;
            document.body.style.backgroundImage = `url('${item.img}')`;
            document.getElementById('compteur').innerText = `Titres restants : ${fileAttente.length} / ${baseRepertoire.length}`;
        }
    </script>
</body>
</html>
